backend:
  name: git-gateway
  branch: main

media_folder: assets/img
public_folder: assets/img

collections:
  - name: "legendas"
    label: "Legendas das Fotos"
    files:
      - name: "editorial-makeup"
        label: "Editorial Makeup"
        file: "content/editorial-makeup.json"
        fields:
          - name: fotos
            label: Fotos
            widget: list
            fields:
              - { label: "Arquivo", name: "arquivo", widget: "string", hint: "Ex: Editorial-makeup-1.webp" }
              - { label: "Legenda", name: "legenda", widget: "string", required: false }

      - name: "editorial-fashion"
        label: "Editorial Fashion"
        file: "content/editorial-fashion.json"
        fields:
          - name: fotos
            label: Fotos
            widget: list
            fields:
              - { label: "Arquivo", name: "arquivo", widget: "string", hint: "Ex: Editorial-fashion-1.webp" }
              - { label: "Legenda", name: "legenda", widget: "string", required: false }

      - name: "beauty-portraits"
        label: "Beauty Portraits"
        file: "content/beauty-portraits.json"
        fields:
          - name: fotos
            label: Fotos
            widget: list
            fields:
              - { label: "Arquivo", name: "arquivo", widget: "string", hint: "Ex: Beauty-portraits-1.webp" }
              - { label: "Legenda", name: "legenda", widget: "string", required: false }

      - name: "advertising"
        label: "Advertising"
        file: "content/advertising.json"
        fields:
          - name: fotos
            label: Fotos
            widget: list
            fields:
              - { label: "Arquivo", name: "arquivo", widget: "string", hint: "Ex: Advertising-1.webp" }
              - { label: "Legenda", name: "legenda", widget: "string", required: false }